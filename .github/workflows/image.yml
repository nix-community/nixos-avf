name: Build image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - trunk

jobs:
  update:
    strategy:
      matrix:
        arch:
        - id: aarch64
          os: ubuntu-24.04-arm
        - id: x86_64
          os: ubuntu-latest
        nixos:
        - unstable
        - 24.11
    runs-on: ${{ matrix.arch.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: 'trunk'
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-${{ matrix.nixos }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          # explicitly enable sandbox
          extra_nix_config: sandbox = true
    - uses: cachix/cachix-action@v16
      with:
        name: nix-community
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix-channel --add https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-${{ matrix.nixos }}.tar.gz nixpkgs
      - run: nix-channel --update
      - run: nix-build initial.nix
      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.nixos }}-${{ matrix.arch.id }}
          path: result
