name: Build image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - trunk

jobs:
  update:
    strategy:
      matrix:
        arch:
        - id: aarch64
          os: nscloud-ubuntu-22.04-arm64-8x8
        - id: x86_64
          os: nscloud-ubuntu-22.04-amd64-8x8
        nixos:
        - unstable
        - 24.11
    runs-on: ${{ matrix.arch.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: 'trunk'
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-${{ matrix.nixos }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          # explicitly enable sandbox
          extra_nix_config: |
            sandbox = true
            system-features = nixos-test benchmark big-parallel kvm
      - uses: cachix/cachix-action@v16
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix-channel --add https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-${{ matrix.nixos }}.tar.gz nixpkgs
      - run: nix-channel --update
      - run: nix-build initial.nix -A config.system.build.toplevel | cachix push nix-community
      - run: nix-build initial.nix -A config.system.build.avfImage
      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.nixos }}-${{ matrix.arch.id }}
          path: result
